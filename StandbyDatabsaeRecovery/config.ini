[oracle]
sid = stdbyinp
db_home = /opt/oracle/product/19c/dbhome_1

[paths]
s3_base = /mnt/s3bucket/RMAN/
local_base = /u03/backup/rman/stdbyinp/
query_file = queries/standbydb.sql
tar_bin = /usr/bin/tar

[recovery]
archive_pattern = *_archivelog_1*.tar.gz
bridge_lookback_days = 1
open_read_only = true
strict_old_logs_stop = false
fail_if_no_forward = false

[cleanup]
cleanup_local_after_success = true
uncatalog_local_after_success = true
cleanup_local_on_rejected_run = true
uncatalog_local_on_rejected_run = true

[mailer]
enabled = false
smtp_host = localhost
smtp_port = 25
sender = oracle-refresh@localhost
recipients = dba-team@example.com
username =
password =
use_tls = false

[messager]
enabled = false
# Slack/Teams/Discord-style incoming webhook URL. Leave blank when disabled.
webhook_url =
channel =

[runtime]
log_level = INFO
